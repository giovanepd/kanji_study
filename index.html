<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU</div>
        <a href="#kanji-random" onclick="toggleMenu()">Aleatório</a>
        <a href="#t-counts" onclick="toggleMenu()">Contadores</a>
        <a href="#t-week" onclick="toggleMenu()">Semana</a>
        <a href="#t-month" onclick="toggleMenu()">Calendário</a>
        <a href="#t-list" onclick="toggleMenu()">Lista</a>
    </nav>

    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="hamburger-inline" onclick="toggleMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div style="font-weight: bold; font-size: 1.2rem;">KANJI MASTER</div>
            </div>
            <div class="controls">
                <button class="btn-lang active" onclick="changeLang('pt', this)">PT</button>
                <button class="btn-lang" onclick="changeLang('en', this)">EN</button>
                <button class="btn-lang" onclick="changeLang('es', this)">ES</button>
            </div>
        </div>

        <div class="unit-filter-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <label class="unit-checkbox">
                <input type="checkbox" class="unit-input" value="1" checked onchange="nextCard()"> <span>U1</span>
            </label>
            <label class="unit-checkbox">
                <input type="checkbox" class="unit-input" value="2" checked onchange="nextCard()"> <span>U2</span>
            </label>
            <label class="unit-checkbox">
                <input type="checkbox" class="unit-input" value="3" checked onchange="nextCard()"> <span>U3</span>
            </label>
            <label class="unit-checkbox">
                <input type="checkbox" class="unit-input" value="4" checked onchange="nextCard()"> <span>U4</span>
            </label>
            <label class="unit-checkbox">
                <input type="checkbox" class="unit-input" value="sem unidade" checked onchange="nextCard()"> <span>S/U</span>
            </label>
        </div>

        <div class="flashcard" id="kanji-random" onclick="showAnswer()">
            <div id="kanji-main">---</div>
            <div id="tap-hint"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <div id="answer-box">
                <div class="entry"><span class="label">Padrão</span><div id="ans-full" class="data-line"></div></div>
                <div class="entry"><span class="label">Leitura KUN</span><div id="ans-kun" class="data-line"></div></div>
                <div class="entry"><span class="label">Leitura ON</span><div id="ans-on" class="data-line"></div></div>
            </div>
        </div>
        
        <button class="btn-next" onclick="nextCard()"><i class="fa-solid fa-dice-six"></i></button>

        <h2 id="t-counts">Contadores</h2>
        <div class="grid" id="grid-counts"></div>
        <h2 id="t-week">Semana</h2>
        <div class="grid" id="grid-week"></div>
        <h2 id="t-month">Calendário</h2>
        <div class="grid" id="grid-month"></div>
        <h2 id="t-list">Lista de Referência</h2>
        <div class="list-area" id="main-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
